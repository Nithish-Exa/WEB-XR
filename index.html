<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Production-Ready WebXR Bike Viewer with WebGL and WebGPU renderer toggle, studio and outdoor environments, and VR support." />
  <title>WebXR Bike Viewer</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; width: 100%; height: 100%; }

    /* Loading screen */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 64px; height: 64px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      margin-top: 20px; color: rgba(255,255,255,0.6);
      font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
    }
    .loader-progress {
      margin-top: 12px; width: 200px; height: 2px;
      background: rgba(255,255,255,0.1); border-radius: 1px; overflow: hidden;
    }
    .loader-progress-bar {
      height: 100%; width: 0%; background: #00d4ff;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading Bike Viewer</div>
    <div class="loader-progress"><div class="loader-progress-bar" id="progress-bar"></div></div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
